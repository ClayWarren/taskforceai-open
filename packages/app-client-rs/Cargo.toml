[package]
name = "taskforceai-app-client"
version = "0.1.0"
edition = "2021"
description = "TaskForceAI app-server client"
authors = ["TaskForceAI"]
license = "Proprietary"
repository = "https://github.com/TaskForceAI"
rust-version = "1.96.0"
publish = false

[dependencies]
futures-util = "0.3"
serde = {version = "1.0.228", features = ["derive"]}
serde_json = "1.0.145"
taskforceai-app-protocol = {path = "../app-protocol-rs"}
thiserror = "1.0"
reqwest = {version = "0.12", features = ["json", "rustls-tls", "stream"], default-features = false}
tokio = {version = "1.0", features = ["io-util", "process", "sync", "rt", "macros", "time"]}

[dev-dependencies]
tokio = {version = "1.0", features = ["io-util", "process", "sync", "rt", "macros", "time", "net"]}
