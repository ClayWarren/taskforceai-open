version: '2'

sql:
  - engine: 'postgresql'
    schema:
      - 'sqlc/schema.sql'
    queries:
      - 'sqlc/queries'
    gen:
      go:
        package: 'db'
        out: '../../adapters/pkg/db'
        sql_package: 'pgx/v5'
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
