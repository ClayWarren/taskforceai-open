[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "taskforceai"
version = "1.4.0"
description = "TaskForceAI Python SDK"
authors = [{name = "TaskForceAI"}]
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["httpx>=0.24,<0.29", "pydantic>=2.0", "opentelemetry-api>=1.20.0"]
license = "MIT"
license-files = ["LICENSE"]
keywords = ["ai", "multi-agent", "sdk", "taskforceai"]
classifiers = [
  "Programming Language :: Python",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Operating System :: OS Independent",
]

[project.urls]
Homepage = "https://taskforceai.chat"
Repository = "https://github.com/ClayWarren/taskforceai-open/tree/main/packages/sdk-python"
Issues = "https://github.com/ClayWarren/taskforceai-open/issues"

[project.optional-dependencies]
dev = [
  "pytest==9.1.1",
  "pytest-asyncio==1.4.0",
  "pytest-cov>=5,<8",
  "anyio==4.14.1",
  "ruff==0.15.20",
  "mypy==2.1.0",
  "mutmut==3.6.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
filterwarnings = ["error", "ignore:'asyncio.*' is deprecated:DeprecationWarning:pytest_asyncio"]
norecursedirs = ["mutants"]

[tool.mutmut]
source_paths = ["src/"]
pytest_add_cli_args = ["-p", "asyncio"]
pytest_add_cli_args_test_selection = ["tests/"]

[tool.ruff]
target-version = "py39"
line-length = 100
src = ["src", "tests"]
extend-exclude = ["src/taskforceai.egg-info"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "C90"]
ignore = []

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "lf"

[tool.mypy]
exclude = ["mutants/"]
python_version = "3.10"
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_unreachable = true
warn_return_any = true
no_implicit_optional = true
strict_optional = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
show_error_codes = true
ignore_missing_imports = false
namespace_packages = true
