<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>TaskForceAI Desktop</title>
    <style>
      :root {
        color-scheme: dark light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
      }

      .container {
        text-align: center;
        padding: 24px;
      }

      .spinner {
        width: 48px;
        height: 48px;
        margin: 0 auto 16px auto;
        border-radius: 50%;
        border: 4px solid rgba(248, 250, 252, 0.25);
        border-top-color: #38bdf8;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      h1 {
        font-size: 1.2rem;
        margin: 0 0 8px 0;
      }

      p {
        margin: 0;
        font-size: 0.95rem;
        opacity: 0.75;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="spinner" aria-hidden="true"></div>
      <h1>Starting TaskForceAI…</h1>
      <p>The desktop agent is getting ready. This window will update automatically.</p>
    </div>
  </body>
</html>
