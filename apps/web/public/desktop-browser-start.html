<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; img-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>New tab</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #111111;
        --text: #f2f2f2;
        --muted: #9b9b9b;
        --icon: #a8a8a8;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI",
          sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      .empty-state {
        display: grid;
        justify-items: center;
        gap: 16px;
        transform: translateY(16vh);
      }

      .empty-title {
        margin: 0;
        font-size: 21px;
        font-weight: 650;
        letter-spacing: 0;
      }

      .empty-subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 18px;
        letter-spacing: 0;
      }

      .globe {
        position: relative;
        display: inline-block;
        width: 76px;
        height: 76px;
        margin-bottom: 16px;
        border: 4px solid var(--icon);
        border-radius: 50%;
        color: var(--icon);
      }

      .globe::before,
      .globe::after {
        content: "";
        position: absolute;
        inset: 50% auto auto 50%;
        transform: translate(-50%, -50%);
        border-color: currentColor;
      }

      .globe::before {
        width: 36%;
        height: 100%;
        border-right: inherit;
        border-left: inherit;
        border-radius: 50%;
      }

      .globe::after {
        width: 100%;
        border-top: inherit;
      }
    </style>
  </head>
  <body>
    <main class="empty-state" aria-label="Start browsing">
      <span class="globe" aria-hidden="true"></span>
      <h1 class="empty-title">Start browsing</h1>
      <p class="empty-subtitle">Enter a URL to open a page</p>
    </main>
  </body>
</html>
