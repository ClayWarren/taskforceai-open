<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskForceAI - Loading...</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        color: #f1f5f9;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      .container {
        text-align: center;
        z-index: 10;
      }

      .logo {
        width: 80px;
        height: 80px;
        margin-bottom: 2rem;
        position: relative;
      }

      .logo-circle {
        width: 100%;
        height: 100%;
        border: 3px solid #3b82f6;
        border-radius: 50%;
        position: relative;
        animation: pulse 2s ease-in-out infinite;
      }

      .logo-inner {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-weight: bold;
        font-size: 24px;
        color: #3b82f6;
      }

      .spinner {
        width: 50px;
        height: 50px;
        margin: 2rem auto;
        border: 3px solid rgba(59, 130, 246, 0.2);
        border-top: 3px solid #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      .title {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .subtitle {
        font-size: 1rem;
        color: #94a3b8;
        margin-bottom: 2rem;
      }

      .loading-text {
        font-size: 0.9rem;
        color: #64748b;
        animation: fadeInOut 2s ease-in-out infinite;
      }

      .particles {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: hidden;
      }

      .particle {
        position: absolute;
        width: 4px;
        height: 4px;
        background: #3b82f6;
        border-radius: 50%;
        opacity: 0.3;
        animation: float 6s ease-in-out infinite;
      }

      .particle:nth-child(1) {
        top: 20%;
        left: 20%;
        animation-delay: 0s;
      }
      .particle:nth-child(2) {
        top: 80%;
        left: 80%;
        animation-delay: 1s;
      }
      .particle:nth-child(3) {
        top: 60%;
        left: 10%;
        animation-delay: 2s;
      }
      .particle:nth-child(4) {
        top: 10%;
        left: 60%;
        animation-delay: 3s;
      }
      .particle:nth-child(5) {
        top: 70%;
        left: 70%;
        animation-delay: 4s;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.05);
          opacity: 0.8;
        }
      }

      @keyframes fadeInOut {
        0%,
        100% {
          opacity: 0.5;
        }
        50% {
          opacity: 1;
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px) rotate(0deg);
        }
        50% {
          transform: translateY(-20px) rotate(180deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="particles">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>

    <div class="container">
      <div class="logo">
        <div class="logo-circle">
          <div class="logo-inner">T</div>
        </div>
      </div>

      <h1 class="title">TaskForceAI</h1>
      <p class="subtitle">Multi-Agent AI Orchestration</p>

      <div class="spinner"></div>
      <p class="loading-text">Initializing application...</p>
    </div>

    <script>
      // Update loading text with different messages
      const messages = [
        'Initializing application...',
        'Starting app server...',
        'Loading AI models...',
        'Establishing connections...',
        'Almost ready...',
      ];

      let messageIndex = 0;
      const loadingText = document.querySelector('.loading-text');

      setInterval(() => {
        messageIndex = (messageIndex + 1) % messages.length;
        loadingText.textContent = messages[messageIndex];
      }, 2000);
    </script>
  </body>
</html>
